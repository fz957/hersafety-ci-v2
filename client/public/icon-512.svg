<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBF1EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5E1D5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" floodOpacity="0.15"/>
    </filter>
  </defs>

  <!-- Fond crème -->
  <rect width="512" height="512" rx="120" ry="120" fill="url(#bg)"/>

  <!-- Logo HerSafety centré avec ombre -->
  <g transform="translate(256, 195) scale(11)" filter="url(#shadow)">
    <!-- Bouclier (sakura #EC9C9D) -->
    <path d="M11 1 L21 4 V13 C21 19 16.5 23.5 11 25 C5.5 23.5 1 19 1 13 V4 Z"
      fill="#EC9C9D" stroke="#D67E80" strokeWidth="0.8" strokeLinejoin="round" />

    <!-- Coeur (chocolate #443025) -->
    <path d="M11 9 C9.6 7.2 6 7.8 6 11 C6 13.6 9 15.6 11 17 C13 15.6 16 13.6 16 11 C16 7.8 12.4 7.2 11 9 Z"
      fill="#443025" />
  </g>

  <!-- Texte HerSafety -->
  <text x="256" y="410" font-size="56" font-weight="700" fill="#443025" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="-1">
    HerSafety
  </text>
</svg>