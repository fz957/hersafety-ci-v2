<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F48FB1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF85B4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond rose pastel -->
  <rect width="512" height="512" rx="120" ry="120" fill="url(#grad)"/>

  <!-- Silhouette élégante -->
  <g transform="translate(256, 256)">
    <!-- Tête -->
    <circle cx="0" cy="-80" r="40" fill="white"/>

    <!-- Corps stylisé -->
    <path d="M -35,-35 Q -50,0 -45,60 L 45,60 Q 50,0 35,-35 Z"
          fill="white" stroke="none"/>

    <!-- Bras -->
    <line x1="-35" y1="-15" x2="-75" y2="15" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="35" y1="-15" x2="75" y2="15" stroke="white" stroke-width="12" stroke-linecap="round"/>

    <!-- Bouclier de sécurité -->
    <path d="M -25,75 L 0,65 L 25,75 L 25,105 Q 0,125 -25,105 Z"
          fill="#FF85B4" stroke="white" stroke-width="4"/>

    <!-- Checkmark inside shield -->
    <path d="M -10,95 L -2,105 L 15,85"
          stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
