<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F48FB1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF85B4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond rose pastel -->
  <rect width="192" height="192" rx="50" ry="50" fill="url(#grad)"/>

  <!-- Silhouette élégante -->
  <g transform="translate(96, 96)">
    <!-- Tête -->
    <circle cx="0" cy="-28" r="14" fill="white"/>

    <!-- Corps stylisé -->
    <path d="M -12,-12 Q -18,0 -15,20 L 15,20 Q 18,0 12,-12 Z"
          fill="white" stroke="none"/>

    <!-- Bras -->
    <line x1="-12" y1="-5" x2="-26" y2="5" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="-5" x2="26" y2="5" stroke="white" stroke-width="4" stroke-linecap="round"/>

    <!-- Bouclier de sécurité (accent) -->
    <path d="M -8,25 L 0,20 L 8,25 L 8,35 Q 0,40 -8,35 Z"
          fill="#FF85B4" stroke="white" stroke-width="1.5"/>

    <!-- Checkmark inside shield -->
    <path d="M -3,32 L -1,34 L 4,29"
          stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
