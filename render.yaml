databases:
  - name: hersafety-postgres
    plan: free
    databaseName: hersafety
    user: hersafety

services:
  - type: web
    name: hersafety-backend
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hersafety-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: APP_MODE
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: AFRICASTALKING_USERNAME
        sync: false

  - type: web
    name: hersafety-frontend
    runtime: static
    plan: starter
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: hersafety-backend
          type: web
          property: host
