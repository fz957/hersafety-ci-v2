# Netlify configuration for HerSafety CI

[build]
  # Build command - build the React app with Vite
  command = "cd client && npm run build"
  # Where Netlify publishes the built site
  publish = "client/dist"
  # Install devDependencies (Vite, ESLint, etc.)
  environment = { NPM_FLAGS = "--include=dev" }

# SPA routing - all routes go to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Disable automatic redirects file parsing (we use toml instead)
[context.production.environment]
  NPM_FLAGS = "--include=dev"
