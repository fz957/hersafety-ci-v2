# Netlify configuration for HerSafety CI

[build]
  # Build command - install client deps THEN build with Vite
  command = "cd client && npm ci && npm run build"
  # Where Netlify publishes the built site
  publish = "client/dist"

# SPA routing - all routes go to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Disable automatic redirects file parsing (we use toml instead)
[context.production.environment]
  NPM_FLAGS = "--include=dev"
