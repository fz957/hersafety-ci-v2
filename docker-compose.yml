services:
  postgres:
    image: postgres:16-alpine
    container_name: hersafety_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hersafety
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hersafety"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hersafety_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hersafety
      NODE_ENV: production
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hersafety_client
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://app:5000
      VITE_DEV_API_URL: http://localhost:5001

volumes:
  postgres_data:
