name: HerSafety CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hersafety_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hersafety_test
          JWT_SECRET: test_jwt_secret_ci
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_ci
          APP_MODE: development
        run: npm run migrate

      - name: Run tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hersafety_test
          JWT_SECRET: test_jwt_secret_ci
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_ci
          JWT_EXPIRES_IN: 24h
          ANTHROPIC_API_KEY: test_anthropic_key
          AFRICASTALKING_API_KEY: test_at_key
          AFRICASTALKING_USERNAME: test_at_user
          APP_MODE: development
          APP_URL: http://localhost:5000
          PORT: 5000
        run: npm test -- --coverage

      - name: Check coverage threshold
        working-directory: server
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(grep -o '"lines":{[^}]*"pct":[0-9]*' coverage/coverage-summary.json | tail -1 | grep -o '[0-9]*$')
            echo "Coverage: ${LINES}%"
            if [ ${LINES} -lt 70 ]; then echo "Coverage below 70%"; exit 1; fi
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: server/coverage/

  frontend-build:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint code
        working-directory: client
        run: npm run lint || true

      - name: Build application
        working-directory: client
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist/

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: hersafety:backend-latest

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: hersafety:frontend-latest
