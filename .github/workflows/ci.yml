name: HerSafety CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests Jest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hersafety_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hersafety_test
          JWT_SECRET: test_jwt_secret_ci
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_ci
          APP_MODE: development
        run: npm run migrate

      - name: Run tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hersafety_test
          JWT_SECRET: test_jwt_secret_ci
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_ci
          JWT_EXPIRES_IN: 24h
          APP_MODE: development
          APP_URL: http://localhost:5000
          PORT: 5000
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: server/coverage/
